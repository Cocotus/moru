name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FLUTTER_VERSION: 3.44.1

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Generate code (Riverpod/Freezed/JSON)
        run: dart run build_runner build
      - name: Analyze (includes riverpod_lint via analyzer plugin)
        run: flutter analyze
      - name: Run tests
        run: flutter test

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter build web --release

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # libsecret/keyring headers are required by flutter_secure_storage;
      # libwebkit2gtk-4.1-dev is required by the desktop_webview_window plugin (Ubuntu 24.04+).
      - name: Install Linux build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev libwebkit2gtk-4.1-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter build linux --release

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter build windows --release
